<h1>Вход</h1>


{% if error %}
    <p style="background-color: crimson;">{{error}}</p>
{% endif %}

<div class="m-3 col-md-6">
    <form action="" method="POST" novalidate>
        <div class="mb-3">
            <label for="inputName" class="form-label">Логин</label>
            <input type="text" id="inputName" class="form-controll" name="nickname" {% if user_data %} value="{{user.nickname}}" {% endif %}>
        </div>

        <div class="mb-3">
            <label for="inputPassword" class="form-label">Пароль</label>
            <input type="password" id="inputPassword" class="form-controll" name="password">
        </div>

        <input type="submit" class="btn btn-primary">
    </form>
</div>
